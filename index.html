<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Video Player</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #d4a829;
  --bg: #0a0f1a;
  --surface: rgba(6,10,20,0.88);
  --border: rgba(255,255,255,0.11);
  --text: #e8dfc0;
  --dim: rgba(232,223,192,0.42);
}

html, body {
  height: 100%; height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
  overflow: hidden;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* ── Landing ─────────────────────────────── */
#landing {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 22px; padding: 40px;
  background: var(--bg); z-index: 200;
}
#landing h1 {
  font-size: 2.2rem; color: var(--gold);
  font-weight: 300; letter-spacing: 0.06em;
}
#landing p {
  color: var(--dim); text-align: center;
  max-width: 440px; line-height: 1.7; font-size: 0.88rem;
}
.kbd {
  display: inline-block;
  background: rgba(255,255,255,0.09);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 4px; padding: 1px 7px;
  font-family: monospace; font-size: 0.82em;
}
#file-btn {
  background: var(--gold); color: var(--bg);
  border: none; padding: 14px 40px; border-radius: 10px;
  font-size: 1rem; font-weight: 700; cursor: pointer;
  letter-spacing: 0.04em;
  transition: background 0.14s, transform 0.1s;
}
#file-btn:hover { background: #e8c040; transform: scale(1.02); }
#file-btn:active { transform: scale(0.97); }
#file-input { display: none; }

/* ── Player ──────────────────────────────── */
#player-screen {
  display: flex; flex-direction: column;
  height: 100%; height: 100dvh;
}
#player-screen.hidden { display: none; }

#video-wrapper {
  flex: 1; position: relative;
  background: #000; overflow: hidden; min-height: 0;
}

#video {
  width: 100%; height: 100%;
  object-fit: contain; display: block;
}

#canvas {
  position: absolute; inset: 0;
  touch-action: none;
}
#canvas.pen-mode  { cursor: crosshair; }
#canvas.laser-mode { cursor: none; }

/* ── Speed HUD ───────────────────────────── */
#speed-hud {
  position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid rgba(212,168,41,0.28);
  border-radius: 10px; padding: 5px 14px;
  display: flex; align-items: center; gap: 2px;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  pointer-events: none;
  opacity: 0; transition: opacity 0.25s;
  white-space: nowrap;
}
#speed-hud.vis { opacity: 1; }
.hud-lbl {
  color: var(--gold); font-size: 0.58rem;
  text-transform: uppercase; letter-spacing: 0.14em;
  margin-right: 8px; opacity: 0.7;
}
.sp {
  font-size: 0.7rem; color: var(--dim);
  padding: 2px 5px; border-radius: 4px;
  min-width: 36px; text-align: center;
  font-variant-numeric: tabular-nums;
  transition: all 0.12s;
}
.sp.on {
  color: var(--gold); font-weight: 700;
  background: rgba(212,168,41,0.16);
  border: 1px solid rgba(212,168,41,0.42);
}

/* ── Toolbar ─────────────────────────────── */
#toolbar {
  position: absolute; top: 12px; left: 12px; z-index: 30;
  background: var(--surface);
  border: 1px solid var(--border); border-radius: 14px;
  padding: 10px; display: flex; flex-direction: column; gap: 8px;
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  min-width: 56px;
}
#toolbar.col .hide-when-col { display: none !important; }

.sec-lbl {
  font-size: 0.57rem; text-transform: uppercase;
  letter-spacing: 0.13em; color: var(--dim);
  margin-bottom: 1px;
}
.tdiv { height: 1px; background: var(--border); }
.trow { display: flex; gap: 6px; flex-wrap: wrap; }

.tbtn {
  width: 44px; height: 44px;
  border: 2px solid transparent; border-radius: 10px;
  background: rgba(255,255,255,0.06);
  color: rgba(232,223,192,0.6);
  font-size: 1.2rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.13s; flex-shrink: 0;
}
.tbtn:hover { background: rgba(255,255,255,0.13); color: var(--text); }
.tbtn.on { border-color: var(--gold); background: rgba(212,168,41,0.16); color: var(--gold); }

.cdot {
  width: 42px; height: 42px; border-radius: 50%;
  border: 2.5px solid transparent; cursor: pointer;
  transition: transform 0.13s, border-color 0.13s; flex-shrink: 0;
}
.cdot:hover { transform: scale(1.12); }
.cdot.on { border-color: #fff; box-shadow: 0 0 0 1.5px rgba(0,0,0,0.35); }

.szbtn {
  flex: 1; height: 36px;
  border: 1px solid var(--border); border-radius: 7px;
  background: rgba(255,255,255,0.04);
  color: var(--dim); font-size: 0.73rem; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.13s;
}
.szbtn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
.szbtn.on { border-color: var(--gold); background: rgba(212,168,41,0.13); color: var(--gold); }

.abtn {
  width: 100%; height: 36px;
  border: 1px solid var(--border); border-radius: 7px;
  background: rgba(255,255,255,0.04);
  color: var(--dim); font-size: 0.73rem; font-weight: 500;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: all 0.13s;
}
.abtn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

#clear-btn {
  border-color: rgba(255,70,70,0.32);
  color: rgba(255,100,100,0.7);
}
#clear-btn:hover { background: rgba(255,70,70,0.13); color: #ff7070; }

#tb-tog {
  height: 28px; border: 1px solid var(--border); border-radius: 6px;
  background: rgba(255,255,255,0.03); color: var(--dim);
  font-size: 0.66rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.13s;
}
#tb-tog:hover { background: rgba(255,255,255,0.09); color: var(--text); }

#tb-drag {
  display: flex; align-items: center; justify-content: center;
  height: 18px; cursor: grab; color: var(--dim);
  letter-spacing: 3px; font-size: 0.7rem;
  transition: color 0.13s;
}
#tb-drag:hover { color: var(--text); }
#tb-drag:active { cursor: grabbing; }

/* ── Bottom bar ──────────────────────────── */
#bottom-bar {
  background: rgba(0,0,0,0.9);
  border-top: 1px solid var(--border);
  padding: 10px 16px 16px;
}
#scrub-row { display: flex; align-items: center; gap: 12px; }

#play-btn {
  width: 42px; height: 42px; border: none; border-radius: 50%;
  background: var(--gold); color: var(--bg);
  font-size: 1.1rem; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.13s, transform 0.1s;
}
#play-btn:hover { background: #e8c040; }
#play-btn:active { transform: scale(0.92); }

#time-disp {
  font-size: 0.77rem; color: var(--dim);
  font-variant-numeric: tabular-nums;
  white-space: nowrap; min-width: 94px;
}

#scrub-track {
  flex: 1; height: 5px;
  background: rgba(255,255,255,0.13);
  border-radius: 999px; position: relative;
  cursor: pointer; touch-action: none;
}
#scrub-track::before {
  content: ''; position: absolute; inset: -10px 0;
}
#scrub-fill {
  position: absolute; left: 0; top: 0; height: 100%;
  background: var(--gold); border-radius: inherit;
  pointer-events: none;
}
#scrub-dot {
  position: absolute; top: 50%;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 10px rgba(212,168,41,0.55);
  transform: translate(-50%, -50%);
  pointer-events: none;
  transition: width 0.1s, height 0.1s;
}
#scrub-track:hover #scrub-dot { width: 20px; height: 20px; }

.spd-btn {
  width: 36px; height: 36px; border-radius: 8px;
  border: 1.5px solid rgba(212,168,41,0.35);
  background: rgba(255,255,255,0.05);
  color: var(--dim); font-size: 0.8rem; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.13s;
}
.spd-btn:hover { background: rgba(212,168,41,0.15); border-color: var(--gold); color: var(--gold); }
.spd-btn:active { transform: scale(0.9); }

#fs-btn {
  width: 36px; height: 36px; border-radius: 8px;
  border: 1.5px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: var(--dim); font-size: 1rem; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.13s;
}
#fs-btn:hover { background: rgba(255,255,255,0.12); color: var(--text); }
#fs-btn:active { transform: scale(0.9); }
</style>
</head>
<body>

<!-- Landing -->
<div id="landing">
  <h1>Video Player</h1>
  <p>
    Choose any video to begin.<br><br>
    <span class="kbd">Space</span> Play&nbsp;/&nbsp;Pause &ensp;
    <span class="kbd">,</span> Slower &ensp;
    <span class="kbd">.</span> Faster &ensp;
    <span class="kbd">⌘Z</span> Undo
  </p>
  <button id="file-btn">Choose Video</button>
  <input type="file" id="file-input" accept="video/*">
</div>

<!-- Player -->
<div id="player-screen" class="hidden">
  <div id="video-wrapper">
    <video id="video" playsinline></video>
    <canvas id="canvas" class="pen-mode"></canvas>

    <div id="speed-hud"><span class="hud-lbl">Speed</span></div>

    <div id="toolbar">
      <!-- Drag handle -->
      <div id="tb-drag">⠿ ⠿</div>

      <!-- Mode -->
      <div class="trow">
        <button class="tbtn on" id="pen-btn" title="Pen (persists)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
        </button>
        <button class="tbtn" id="laser-btn" title="Laser pointer (fades)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
        </button>
      </div>

      <div class="tdiv hide-when-col"></div>

      <!-- Colors -->
      <div class="hide-when-col">
        <div class="sec-lbl">Color</div>
        <div class="trow" id="cr1"></div>
        <div class="trow" style="margin-top:5px" id="cr2"></div>
      </div>

      <div class="tdiv hide-when-col"></div>

      <!-- Sizes -->
      <div class="hide-when-col">
        <div class="sec-lbl">Size</div>
        <div class="trow" id="szrow"></div>
      </div>

      <div class="tdiv hide-when-col"></div>

      <!-- Actions -->
      <div class="hide-when-col" style="display:flex;flex-direction:column;gap:5px">
        <button class="abtn" id="undo-btn">↩ Undo</button>
        <button class="abtn" id="clear-btn">✕ Clear all</button>
      </div>

      <div class="tdiv"></div>
      <button id="tb-tog">▲ Hide</button>
    </div>
  </div>

  <div id="bottom-bar">
    <div id="scrub-row">
      <button class="spd-btn" id="speed-dn-btn">◀◀</button>
      <button id="play-btn">▶</button>
      <button class="spd-btn" id="speed-up-btn">▶▶</button>
      <span id="time-disp">0:00 / 0:00</span>
      <div id="scrub-track">
        <div id="scrub-fill"></div>
        <div id="scrub-dot"></div>
      </div>
      <button id="fs-btn">⛶</button>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

// Elements
const landing      = $('landing');
const playerScreen = $('player-screen');
const fileInput    = $('file-input');
const fileBtn      = $('file-btn');
const video        = $('video');
const canvas       = $('canvas');
const ctx          = canvas.getContext('2d');
const speedHud     = $('speed-hud');
const playBtn      = $('play-btn');
const timeDisp     = $('time-disp');
const scrubTrack   = $('scrub-track');
const scrubFill    = $('scrub-fill');
const scrubDot     = $('scrub-dot');
const penBtn       = $('pen-btn');
const laserBtn     = $('laser-btn');
const clearBtn     = $('clear-btn');
const undoBtn      = $('undo-btn');
const tbTog        = $('tb-tog');
const toolbar      = $('toolbar');

// Off-screen ink canvas for committed strokes
const inkCanvas = document.createElement('canvas');
const inkCtx    = inkCanvas.getContext('2d');

// CSS-pixel dimensions (updated in syncCanvasSize)
let cssW = 0, cssH = 0;

// ─── Canvas sizing ──────────────────────────────────
function syncCanvasSize() {
  const wrapper = $('video-wrapper');
  cssW = wrapper.clientWidth;
  cssH = wrapper.clientHeight;
  const dpr = window.devicePixelRatio || 1;

  canvas.width  = cssW * dpr;
  canvas.height = cssH * dpr;
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';

  inkCanvas.width  = cssW * dpr;
  inkCanvas.height = cssH * dpr;

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  inkCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

  redrawInkCanvas();
}

window.addEventListener('resize', syncCanvasSize);

// ─── Speed ─────────────────────────────────────────
const SPEEDS = [0.25, 0.5, 0.75, 1, 1.25, 1.5, 2, 3, 4];
let speedIdx = 3;
let hudTimer = null;

(function buildHUD() {
  SPEEDS.forEach((s, i) => {
    const el = document.createElement('span');
    el.className = 'sp' + (i === speedIdx ? ' on' : '');
    el.textContent = s + '×';
    speedHud.appendChild(el);
  });
})();

function setSpeed(idx) {
  speedIdx = Math.max(0, Math.min(SPEEDS.length - 1, idx));
  video.playbackRate = SPEEDS[speedIdx];
  document.querySelectorAll('.sp').forEach((el, i) =>
    el.classList.toggle('on', i === speedIdx)
  );
  speedHud.classList.add('vis');
  clearTimeout(hudTimer);
  hudTimer = setTimeout(() => speedHud.classList.remove('vis'), 2200);
}

// ─── File loading ───────────────────────────────────
fileBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  video.src = URL.createObjectURL(file);
  video.load();
  landing.style.display = 'none';
  playerScreen.classList.remove('hidden');
});

video.addEventListener('loadedmetadata', () => {
  syncCanvasSize();
  setSpeed(3);
  updateScrub();
});

// ─── Play / Pause ───────────────────────────────────
function togglePlay() {
  video.paused ? video.play() : video.pause();
}

video.addEventListener('play',  () => { playBtn.textContent = '⏸'; });
video.addEventListener('pause', () => { playBtn.textContent = '▶'; });
playBtn.addEventListener('click', togglePlay);

// ─── Scrub bar ──────────────────────────────────────
let scrubbing = false, wasPlaying = false;

function fmtTime(s) {
  if (!isFinite(s)) return '0:00';
  const m = Math.floor(s / 60);
  return m + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}

function updateScrub() {
  if (scrubbing) return;
  const pct = video.duration ? video.currentTime / video.duration : 0;
  scrubFill.style.width = (pct * 100) + '%';
  scrubDot.style.left   = (pct * 100) + '%';
  timeDisp.textContent  = fmtTime(video.currentTime) + ' / ' + fmtTime(video.duration);
}

video.addEventListener('timeupdate', updateScrub);

function applyScrub(e) {
  const rect = scrubTrack.getBoundingClientRect();
  const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  video.currentTime = pct * (video.duration || 0);
  scrubFill.style.width = (pct * 100) + '%';
  scrubDot.style.left   = (pct * 100) + '%';
  timeDisp.textContent  = fmtTime(video.currentTime) + ' / ' + fmtTime(video.duration);
}

scrubTrack.addEventListener('pointerdown', e => {
  scrubbing  = true;
  wasPlaying = !video.paused;
  video.pause();
  applyScrub(e);
  scrubTrack.setPointerCapture(e.pointerId);
});
scrubTrack.addEventListener('pointermove', e => { if (scrubbing) applyScrub(e); });
scrubTrack.addEventListener('pointerup',   e => {
  if (!scrubbing) return;
  scrubbing = false;
  applyScrub(e);
  if (wasPlaying) video.play();
});

// ─── Colors ────────────────────────────────────────
const COLORS = [
  '#ff3030','#ff8c00','#ffe040','#28e070',
  '#28d8ff','#5566ff','#ffffff','#111111'
];

let penColor   = '#ff3030';
let laserColor = '#ff3030';

COLORS.forEach((hex, i) => {
  const btn = document.createElement('button');
  btn.className = 'cdot' + (i === 0 ? ' on' : '');
  btn.style.background = hex;
  btn.dataset.c = hex;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cdot').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    if (mode === 'pen') penColor = hex;
    else laserColor = hex;
  });
  $(i < 4 ? 'cr1' : 'cr2').appendChild(btn);
});

function syncSwatches(col) {
  document.querySelectorAll('.cdot').forEach(b =>
    b.classList.toggle('on', b.dataset.c === col)
  );
}

// ─── Sizes ─────────────────────────────────────────
const SIZES = [{ l: 'S', px: 3 }, { l: 'M', px: 6 }, { l: 'L', px: 14 }];
let curSize = 6;

SIZES.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'szbtn' + (i === 1 ? ' on' : '');
  btn.textContent = s.l;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.szbtn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    curSize = s.px;
  });
  $('szrow').appendChild(btn);
});

// ─── Mode ──────────────────────────────────────────
let mode = 'pen';

penBtn.addEventListener('click', () => {
  mode = 'pen';
  penBtn.classList.add('on');
  laserBtn.classList.remove('on');
  canvas.className = 'pen-mode';
  syncSwatches(penColor);
});

laserBtn.addEventListener('click', () => {
  mode = 'laser';
  laserBtn.classList.add('on');
  penBtn.classList.remove('on');
  canvas.className = 'laser-mode';
  syncSwatches(laserColor);
});

// ─── Stroke drawing ────────────────────────────────
let strokes    = [];
let curStroke  = null;
let activePid  = null;

function ptFromEvent(e) {
  const r = canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top, pr: e.pressure > 0 ? e.pressure : 0.5 };
}

function drawStroke(cx, stroke) {
  const pts = stroke.pts;
  if (!pts.length) return;
  cx.save();
  cx.strokeStyle = stroke.color;
  cx.lineCap = 'round';
  cx.lineJoin = 'round';
  cx.shadowBlur = 2;
  cx.shadowColor = stroke.color;

  if (pts.length === 1) {
    cx.fillStyle = stroke.color;
    cx.beginPath();
    cx.arc(pts[0].x, pts[0].y, stroke.size * 0.6, 0, Math.PI * 2);
    cx.fill();
    cx.restore(); return;
  }

  // Smooth bezier through midpoints
  cx.beginPath();
  cx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length - 1; i++) {
    cx.lineWidth = stroke.size * (0.4 + pts[i].pr * 1.2);
    const mx = (pts[i].x + pts[i+1].x) / 2;
    const my = (pts[i].y + pts[i+1].y) / 2;
    cx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
    cx.stroke();
    cx.beginPath(); cx.moveTo(mx, my);
  }
  const last = pts[pts.length - 1];
  cx.lineWidth = stroke.size * (0.4 + last.pr * 1.2);
  cx.lineTo(last.x, last.y);
  cx.stroke();
  cx.restore();
}

function redrawInkCanvas() {
  inkCtx.clearRect(0, 0, cssW, cssH);
  strokes.forEach(s => drawStroke(inkCtx, s));
}

function compositeToMain() {
  ctx.clearRect(0, 0, cssW, cssH);
  ctx.drawImage(inkCanvas, 0, 0, cssW, cssH);
}

function renderPen() {
  compositeToMain();
  if (curStroke) drawStroke(ctx, curStroke);
}

// ─── Laser pointer ─────────────────────────────────
const LASER_HOLD_MS = 600;
const LASER_FADE_MS = 1100;
let laserStrokes = [];
let laserCurPts  = [];
let laserRaf     = null;

function drawLaserStroke(cx, pts, color, size, alpha) {
  if (!pts.length) return;
  cx.save();
  cx.globalAlpha = alpha;
  cx.strokeStyle = color;
  cx.fillStyle   = color;
  cx.lineCap     = 'round';
  cx.lineJoin    = 'round';
  cx.lineWidth   = size;
  cx.shadowBlur  = 18;
  cx.shadowColor = color;

  if (pts.length === 1) {
    cx.beginPath();
    cx.arc(pts[0].x, pts[0].y, size * 0.5, 0, Math.PI * 2);
    cx.fill();
    cx.restore(); return;
  }

  cx.beginPath();
  cx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length - 1; i++) {
    const mx = (pts[i].x + pts[i+1].x) / 2;
    const my = (pts[i].y + pts[i+1].y) / 2;
    cx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
  }
  cx.lineTo(pts[pts.length - 1].x, pts[pts.length - 1].y);
  cx.stroke();
  cx.restore();
}

function animLaser() {
  const now = performance.now();
  laserStrokes = laserStrokes.filter(s => now - s.born < LASER_HOLD_MS + LASER_FADE_MS);

  compositeToMain();

  laserStrokes.forEach(s => {
    const age   = now - s.born;
    const alpha = age < LASER_HOLD_MS ? 1 : Math.max(0, 1 - (age - LASER_HOLD_MS) / LASER_FADE_MS);
    drawLaserStroke(ctx, s.pts, s.color, s.size, alpha);
  });

  if (laserCurPts.length) {
    drawLaserStroke(ctx, laserCurPts, laserColor, Math.max(curSize, 4), 1);
  }

  if (laserStrokes.length || laserCurPts.length) {
    laserRaf = requestAnimationFrame(animLaser);
  } else {
    laserRaf = null;
    compositeToMain();
  }
}

// ─── Pointer events on canvas ───────────────────────
let penDown = false;

canvas.addEventListener('pointerdown', e => {
  if (e.pointerType === 'touch' && penDown) return; // palm rejection
  if (e.pointerType === 'pen') penDown = true;
  e.preventDefault();

  if (mode === 'pen') {
    curStroke = { color: penColor, size: curSize, pts: [ptFromEvent(e)] };
    activePid = e.pointerId;
    canvas.setPointerCapture(e.pointerId);
  } else {
    laserCurPts = [ptFromEvent(e)];
    activePid = e.pointerId;
    canvas.setPointerCapture(e.pointerId);
    if (!laserRaf) laserRaf = requestAnimationFrame(animLaser);
  }
});

canvas.addEventListener('pointermove', e => {
  if (e.pointerType === 'touch' && penDown) return;
  e.preventDefault();

  if (mode === 'pen' && curStroke && e.pointerId === activePid) {
    curStroke.pts.push(ptFromEvent(e));
    renderPen();
  } else if (mode === 'laser' && e.pointerId === activePid) {
    laserCurPts.push(ptFromEvent(e));
  }
});

canvas.addEventListener('pointerup', e => {
  if (e.pointerType === 'pen') penDown = false;

  if (mode === 'pen' && curStroke && e.pointerId === activePid) {
    curStroke.pts.push(ptFromEvent(e));
    if (curStroke.pts.length >= 1) {
      strokes.push(curStroke);
      drawStroke(inkCtx, curStroke);
    }
    curStroke = null; activePid = null;
    compositeToMain();
  } else if (mode === 'laser' && laserCurPts.length && e.pointerId === activePid) {
    laserCurPts.push(ptFromEvent(e));
    laserStrokes.push({ pts: laserCurPts, color: laserColor, size: Math.max(curSize, 4), born: performance.now() });
    laserCurPts = [];
    activePid = null;
  }
});

canvas.addEventListener('pointercancel', e => {
  if (e.pointerType === 'pen') penDown = false;
  if (mode === 'laser' && laserCurPts.length) {
    laserStrokes.push({ pts: laserCurPts, color: laserColor, size: Math.max(curSize, 4), born: performance.now() });
  }
  laserCurPts = [];
  curStroke = null; activePid = null;
  compositeToMain();
});

// ─── Undo / Clear ──────────────────────────────────
function undoStroke() {
  if (!strokes.length) return;
  strokes.pop();
  redrawInkCanvas();
  compositeToMain();
}

undoBtn.addEventListener('click', undoStroke);

clearBtn.addEventListener('click', () => {
  strokes = [];
  inkCtx.clearRect(0, 0, cssW, cssH);
  ctx.clearRect(0, 0, cssW, cssH);
});

// ─── Toolbar drag ──────────────────────────────────
const tbDrag = $('tb-drag');
let tbDragging = false, tbOffX = 0, tbOffY = 0;

tbDrag.addEventListener('pointerdown', e => {
  tbDragging = true;
  const tbRect = toolbar.getBoundingClientRect();
  tbOffX = e.clientX - tbRect.left;
  tbOffY = e.clientY - tbRect.top;
  tbDrag.setPointerCapture(e.pointerId);
  e.preventDefault();
});

tbDrag.addEventListener('pointermove', e => {
  if (!tbDragging) return;
  const wRect = $('video-wrapper').getBoundingClientRect();
  const tbRect = toolbar.getBoundingClientRect();
  const newLeft = Math.max(0, Math.min(wRect.width  - tbRect.width,  e.clientX - wRect.left - tbOffX));
  const newTop  = Math.max(0, Math.min(wRect.height - tbRect.height, e.clientY - wRect.top  - tbOffY));
  toolbar.style.left = newLeft + 'px';
  toolbar.style.top  = newTop  + 'px';
  e.preventDefault();
});

tbDrag.addEventListener('pointerup', () => { tbDragging = false; });

// ─── Toolbar toggle ────────────────────────────────
let tbCollapsed = false;
tbTog.addEventListener('click', () => {
  tbCollapsed = !tbCollapsed;
  toolbar.classList.toggle('col', tbCollapsed);
  tbTog.textContent = tbCollapsed ? '▼ Show' : '▲ Hide';
});

// ─── Speed buttons ─────────────────────────────────
$('speed-dn-btn').addEventListener('click', () => setSpeed(speedIdx - 1));
$('speed-up-btn').addEventListener('click', () => setSpeed(speedIdx + 1));

// ─── Fullscreen ─────────────────────────────────────
const fsBtn = $('fs-btn');

function toggleFullscreen() {
  const el = document.documentElement;
  if (document.fullscreenElement || document.webkitFullscreenElement) {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  } else {
    (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
  }
}

fsBtn.addEventListener('click', toggleFullscreen);

['fullscreenchange', 'webkitfullscreenchange'].forEach(evt =>
  document.addEventListener(evt, () => {
    const inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    fsBtn.textContent = inFs ? '⊠' : '⛶';
  })
);

// ─── Keyboard ──────────────────────────────────────
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
  switch (e.key) {
    case ',': setSpeed(speedIdx - 1); break;
    case '.': setSpeed(speedIdx + 1); break;
    case ' ':
      e.preventDefault(); togglePlay(); break;
    case 'z':
      if (e.metaKey || e.ctrlKey) { e.preventDefault(); undoStroke(); }
      break;
  }
});
</script>
